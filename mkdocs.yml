site_name: Container Service Labs
site_description: 컨테이너 기반 서비스 운영 실습 가이드
site_url: "https://skilleat-labs.github.io/docker-k8s-labs/"

theme:
  name: material
  language: ko
  font:
    text: Pretendard
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow

nav:
  - 홈: index.md
  - 모듈 8:
      - 소개: modules/module8/index.md
      - 개요: modules/module8/overview.md
      - 커리큘럼: modules/module8/curriculum.md
      - 단원 1. VM과 컨테이너:
          - 1-1. VM 직접 체험 — VirtualBox로 Ubuntu 서버 구축하기: modules/module8/1-1.md
          - 1-1-2. Docker 설치 및 첫 실행: modules/module8/1-1-2.md
          - 1-1-3. 이미지는 불변하다: modules/module8/1-1-3.md
          - 1-2. Docker 기본 명령어와 동작 원리: modules/module8/1-2.md
          - 1-3. 레지스트리와 이미지 실습: modules/module8/1-3.md
          - 1-3-1. 나만의 이미지 만들고 ACR에 올리기: modules/module8/1-3-1.md
          - 1-4. 컨테이너 볼륨 (Volume) 실습: modules/module8/1-4.md
          - 1-5. Dockerfile 최적화 실습: modules/module8/1-5.md
          - 1-6. 도커 네트워크 (Docker Network) 실습: modules/module8/1-6.md
          - 1-6-2. 도전 과제 - 미니 블로그: modules/module8/1-6-2.md
          - 1-7. Docker Compose 실습: modules/module8/1-7.md
          - 1-7-2. 환경변수와 설정 분리 실습: modules/module8/1-7-2.md
  - 모듈 10:
      - 소개: modules/module10/index.md
      - 개요: modules/module10/overview.md
      - 커리큘럼: modules/module10/curriculum.md
      - 단원 1. K8s 기초와 철학:
          - 1-1. 실습 환경 설정 (Docker Desktop / Rancher Desktop): modules/module10/1-1.md
          - 1-2. kubectl 기본 명령어 & 클러스터 구조 탐색: modules/module10/1-2.md
      - 단원 2. 핵심 리소스와 설정 관리:
          - 2-1. Pod & Deployment 실습: modules/module10/2-1.md
          - 2-2. Service 실습 (ClusterIP · NodePort · port-forward): modules/module10/2-2.md
          - 2-3. ConfigMap & Secret 실습: modules/module10/2-3.md
          - 2-4. 미니 블로그 3-tier 배포 실습: modules/module10/2-4.md
      - 단원 3. 네트워킹과 스토리지:
          - 3-1. Ingress & Gateway API 실습: modules/module10/3-1.md
          - 3-2. PersistentVolume / PVC 실습: modules/module10/3-2.md
      - 단원 4. 안정성과 확장 관리:
          - 4-1. Probe 설정 실습 (Liveness · Readiness · Startup): modules/module10/4-1.md
          - 4-2. Resource requests/limits & QoS 실습: modules/module10/4-2.md
          - 4-3. HPA (Horizontal Pod Autoscaler) 실습: modules/module10/4-3.md
          - 스스로 해보기: modules/module10/self-check.md


markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css
