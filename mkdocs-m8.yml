site_name: Docker K8s Labs — 모듈 8
site_description: Docker 컨테이너 기초 실습 가이드
site_url: "https://skilleat-labs.github.io/docker-k8s-labs/m8/"

theme:
  name: material
  language: ko
  font:
    text: Pretendard
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow

nav:
  - 홈: index-m8.md
  - 개요: modules/module8/overview.md
  - 커리큘럼: modules/module8/curriculum.md
  - 단원 1. VM과 컨테이너:
      - 1-1. VM 직접 체험 — VirtualBox로 Ubuntu 서버 구축하기: modules/module8/1-1.md
      - 1-1-2. Docker 설치 및 첫 실행: modules/module8/1-1-2.md
      - 1-1-3. 이미지는 불변하다: modules/module8/1-1-3.md
      - 1-2. Docker 기본 명령어와 동작 원리: modules/module8/1-2.md
      - 1-3. 레지스트리와 이미지 실습: modules/module8/1-3.md
      - 1-4. 컨테이너 볼륨 (Volume) 실습: modules/module8/1-4.md
      - 1-5. Dockerfile 최적화 실습: modules/module8/1-5.md
      - 1-6. 도커 네트워크 (Docker Network) 실습: modules/module8/1-6.md
      - 1-7. Docker Compose 실습: modules/module8/1-7.md

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css
