site_name: Docker K8s Labs — 모듈 10
site_description: Kubernetes 핵심 운영 실습 가이드
site_url: "https://skilleat-labs.github.io/docker-k8s-labs/m10/"

theme:
  name: material
  language: ko
  font:
    text: Pretendard
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow

nav:
  - 홈: index-m10.md
  - 개요: modules/module10/overview.md
  - 커리큘럼: modules/module10/curriculum.md
  - 단원 1. K8s 기초와 철학:
      - 1-1. 실습 환경 설정 (Docker Desktop / Rancher Desktop): modules/module10/1-1.md
      - 1-2. kubectl 기본 명령어 & 클러스터 구조 탐색: modules/module10/1-2.md
  - 단원 2. 핵심 리소스와 설정 관리:
      - 2-1. Pod & Deployment 실습: modules/module10/2-1.md
      - 2-2. Service 실습 (ClusterIP · NodePort · port-forward): modules/module10/2-2.md
      - 2-3. ConfigMap & Secret 실습: modules/module10/2-3.md
      - 2-4. 미니 블로그 3-tier 배포 실습: modules/module10/2-4.md
  - 단원 3. 네트워킹과 스토리지:
      - 3-1. Ingress & Gateway API 실습: modules/module10/3-1.md
      - 3-2. PersistentVolume / PVC 실습: modules/module10/3-2.md
  - 단원 4. 안정성과 확장 관리:
      - 4-1. Probe 설정 실습 (Liveness · Readiness · Startup): modules/module10/4-1.md
      - 4-2. Resource requests/limits & QoS 실습: modules/module10/4-2.md
      - 4-3. HPA (Horizontal Pod Autoscaler) 실습: modules/module10/4-3.md
      - 스스로 해보기: modules/module10/self-check.md

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css
