server {
    listen 80;

    # Docker 내장 DNS resolver — 매 요청마다 backend 재조회 (scale out 지원)
    resolver 127.0.0.11 valid=1s;

    # 프론트엔드 hostname 반환 (JS에서 fetch /info 로 읽음)
    location /info {
        add_header Content-Type 'application/json';
        return 200 '{"hostname":"$hostname"}';
    }

    # /api/* → backend 서비스로 프록시
    # 변수 사용 시 nginx가 resolver를 통해 매 요청마다 DNS 재조회 → round-robin 적용
    location /api {
        set $backend_upstream http://backend:5000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 정적 파일 서빙
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
}
